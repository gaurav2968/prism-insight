name: Deploy AlphaPulse Dashboard

on:
  schedule:
    # 9:30 AM IST = 4:00 AM UTC (weekdays)
    - cron: "0 4 * * 1-5"
    # 3:30 PM IST = 10:00 AM UTC (weekdays)
    - cron: "0 10 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh-dashboard:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Regenerate dashboard snapshot
        run: |
          cd prism-in
          python export_static_dashboard.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "AlphaPulse Dashboard Bot"
          git add static-dashboard/data/dashboard-data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: refresh AlphaPulse dashboard snapshot" && git push)

  deploy-pages:
    needs: refresh-dashboard
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "static-dashboard"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
