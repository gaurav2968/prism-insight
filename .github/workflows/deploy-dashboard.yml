name: Deploy AlphaPulse Dashboard

on:
  schedule:
    # 9:30 AM IST = 4:00 AM UTC (weekdays)
    - cron: "0 4 * * 1-5"
    # 3:30 PM IST = 10:00 AM UTC (weekdays)
    - cron: "0 10 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-dashboard:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Regenerate dashboard snapshot
        run: |
          cd prism-in
          python export_static_dashboard.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "AlphaPulse Dashboard Bot"
          git add static-dashboard/data/dashboard-data.json
          # Also update the docs folder for GitHub Pages
          cp -r static-dashboard/* docs/
          git add docs/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: refresh AlphaPulse dashboard snapshot" && git push)
